syntax = "proto3";
package payments;

import "google/protobuf/timestamp.proto";

service PaymentService {
  rpc ProcessPayment(ProcessPaymentRequest) returns (ProcessPaymentResponse);
  rpc RefundPayment(RefundPaymentRequest) returns (RefundPaymentResponse);
  rpc StreamTransactions(StreamTransactionsRequest) returns (stream StreamTransactionsResponse);
}

enum PaymentMethod {
  PAYMENT_METHOD_UNSPECIFIED = 0;
  PAYMENT_METHOD_CREDIT_CARD = 1;
  PAYMENT_METHOD_DEBIT_CARD = 2;
  PAYMENT_METHOD_BANK_TRANSFER = 3;
  PAYMENT_METHOD_CRYPTO = 4;
}

message ProcessPaymentRequest {
  string order_id = 1;
  double amount = 2;
  string currency = 3;
  PaymentMethod method = 4;

  oneof payment_details {
    CardDetails card = 5;
    BankDetails bank = 6;
  }
}

message CardDetails {
  string card_number = 1;
  string expiry = 2;
  string cvv = 3;
}

message BankDetails {
  string routing_number = 1;
  string account_number = 2;
}

message ProcessPaymentResponse {
  string transaction_id = 1;
  bool success = 2;
  string message = 3;
  google.protobuf.Timestamp processed_at = 4;
}

message RefundPaymentRequest {
  string transaction_id = 1;
  double amount = 2;
  string reason = 3;
}

message RefundPaymentResponse {
  string refund_id = 1;
  bool success = 2;
  string message = 3;
}

message StreamTransactionsRequest {
  string user_id = 1;
  google.protobuf.Timestamp since = 2;
}

message StreamTransactionsResponse {
  string transaction_id = 1;
  double amount = 2;
  string currency = 3;
  google.protobuf.Timestamp timestamp = 4;
}
